name: Validate Pipelines

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate JSON syntax — all pipeline files
        run: |
          echo "## 🔍 JSON Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAIL=0
          for f in pipelines/asus pipelines/asus.firewall pipelines/asus.wireless \
                   pipelines/asus.dhcp pipelines/asus.auth pipelines/asus.system; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "✅  $f" | tee -a /tmp/json_results.txt
            else
              echo "❌  $f  — INVALID JSON" | tee -a /tmp/json_results.txt
              python3 -m json.tool "$f" 2>&1 | tee -a /tmp/json_results.txt || true
              FAIL=1
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/json_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $FAIL

      - name: Run synthetic test suite
        run: |
          set -o pipefail
          python3 tests/run_tests.py 2>&1 | tee /tmp/test_results.txt
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY