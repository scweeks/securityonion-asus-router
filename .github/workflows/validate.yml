name: Validate Pipelines

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deny all permissions at the workflow level.
# Each job explicitly declares only what it actually needs.
# This ensures any future jobs added without an explicit permissions block
# receive no token access rather than the repository default.
permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # required for actions/checkout; nothing else needed
    steps:
      - name: Checkout
        uses: actions/checkout@v7  # v7: secure-by-default pull_request_target protections

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate JSON syntax — all pipeline files
        run: |
          echo "## 🔍 JSON Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAIL=0
          for f in pipelines/asus pipelines/asus.firewall pipelines/asus.wireless \
                   pipelines/asus.dhcp pipelines/asus.auth pipelines/asus.system; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "✅  $f" | tee -a /tmp/json_results.txt
            else
              echo "❌  $f  — INVALID JSON" | tee -a /tmp/json_results.txt
              python3 -m json.tool "$f" 2>&1 | tee -a /tmp/json_results.txt || true
              FAIL=1
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/json_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $FAIL

      - name: Run synthetic test suite
        run: |
          set -o pipefail
          python3 tests/run_tests.py 2>&1 | tee /tmp/test_results.txt
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Scan for accidental private IP commits
        run: |
          # Scans for RFC 1918 private addresses that should never appear in repo files.
          # RFC 5737 documentation ranges (192.0.2.x, 198.51.100.x, 203.0.113.x) are
          # intentionally used throughout and will not match these patterns.
          # README contains 192.168.x.1 with literal 'x' — not matched by [0-9]{1,3}.
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔒 Privacy Scan" >> $GITHUB_STEP_SUMMARY
          FOUND=$(grep -rInE \
            '(10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}|192\.168\.[0-9]{1,3}\.[0-9]{1,3})' \
            --exclude-dir=.git \
            . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "❌ RFC 1918 private IP address found — remove before merging" \
              | tee -a /tmp/privacy_results.txt
            echo "$FOUND" | tee -a /tmp/privacy_results.txt
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/privacy_results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No private IP addresses found" | tee -a /tmp/privacy_results.txt
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/privacy_results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
